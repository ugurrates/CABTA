<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00a0c6;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle (for favicon clarity) -->
  <circle cx="256" cy="256" r="250" fill="#0a0e1a"/>

  <!-- Shield outline -->
  <path d="M256 52 L420 120 L420 260 C420 360 340 440 256 472 C172 440 92 360 92 260 L92 120 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="14" stroke-linejoin="round"
        filter="url(#glow)" opacity="0.95"/>

  <!-- Inner shield subtle fill -->
  <path d="M256 72 L400 132 L400 258 C400 348 328 420 256 450 C184 420 112 348 112 258 L112 132 Z"
        fill="#00d4ff" opacity="0.04"/>

  <!-- Shield accent arc (left) -->
  <path d="M150 340 C130 300 120 260 120 220" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Neural network nodes -->
  <!-- Center node -->
  <circle cx="256" cy="256" r="14" fill="#00d4ff" filter="url(#glowStrong)" opacity="0.95"/>
  <circle cx="256" cy="256" r="7" fill="#ffffff" opacity="0.9"/>

  <!-- Top node -->
  <circle cx="256" cy="155" r="10" fill="#00d4ff" filter="url(#glow)" opacity="0.85"/>
  <circle cx="256" cy="155" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Bottom node -->
  <circle cx="256" cy="370" r="10" fill="#00d4ff" filter="url(#glow)" opacity="0.85"/>
  <circle cx="256" cy="370" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Left node -->
  <circle cx="170" cy="210" r="10" fill="#00d4ff" filter="url(#glow)" opacity="0.85"/>
  <circle cx="170" cy="210" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Right node -->
  <circle cx="342" cy="210" r="10" fill="#00d4ff" filter="url(#glow)" opacity="0.85"/>
  <circle cx="342" cy="210" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Bottom-left node -->
  <circle cx="185" cy="325" r="10" fill="#00d4ff" filter="url(#glow)" opacity="0.85"/>
  <circle cx="185" cy="325" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Bottom-right node -->
  <circle cx="327" cy="325" r="10" fill="#00d4ff" filter="url(#glow)" opacity="0.85"/>
  <circle cx="327" cy="325" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Top-left node -->
  <circle cx="195" cy="155" r="8" fill="#00d4ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="195" cy="155" r="4" fill="#ffffff" opacity="0.7"/>

  <!-- Top-right node -->
  <circle cx="317" cy="155" r="8" fill="#00d4ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="317" cy="155" r="4" fill="#ffffff" opacity="0.7"/>

  <!-- Neural connections (lines between nodes) -->
  <g stroke="#00d4ff" stroke-width="2.5" opacity="0.45" stroke-linecap="round">
    <!-- Center to all -->
    <line x1="256" y1="256" x2="256" y2="155"/>
    <line x1="256" y1="256" x2="256" y2="370"/>
    <line x1="256" y1="256" x2="170" y2="210"/>
    <line x1="256" y1="256" x2="342" y2="210"/>
    <line x1="256" y1="256" x2="185" y2="325"/>
    <line x1="256" y1="256" x2="327" y2="325"/>

    <!-- Outer ring connections -->
    <line x1="256" y1="155" x2="170" y2="210"/>
    <line x1="256" y1="155" x2="342" y2="210"/>
    <line x1="170" y1="210" x2="185" y2="325"/>
    <line x1="342" y1="210" x2="327" y2="325"/>
    <line x1="185" y1="325" x2="256" y2="370"/>
    <line x1="327" y1="325" x2="256" y2="370"/>

    <!-- Cross connections -->
    <line x1="170" y1="210" x2="327" y2="325"/>
    <line x1="342" y1="210" x2="185" y2="325"/>

    <!-- Small top nodes -->
    <line x1="195" y1="155" x2="256" y2="155"/>
    <line x1="317" y1="155" x2="256" y2="155"/>
    <line x1="195" y1="155" x2="170" y2="210"/>
    <line x1="317" y1="155" x2="342" y2="210"/>
    <line x1="195" y1="155" x2="256" y2="256"/>
    <line x1="317" y1="155" x2="256" y2="256"/>
  </g>

  <!-- Glowing accent dots at intersections -->
  <circle cx="213" cy="233" r="4" fill="#00e5ff" opacity="0.5"/>
  <circle cx="299" cy="233" r="4" fill="#00e5ff" opacity="0.5"/>
  <circle cx="220" cy="290" r="4" fill="#00e5ff" opacity="0.5"/>
  <circle cx="292" cy="290" r="4" fill="#00e5ff" opacity="0.5"/>
</svg>